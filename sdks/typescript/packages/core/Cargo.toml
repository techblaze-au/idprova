[package]
name = "idprova-typescript"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "IDProva TypeScript SDK — napi-rs bindings to the Rust core"
publish = false

[lib]
crate-type = ["cdylib"]
path = "src/native.rs"

[dependencies]
napi = { version = "2", default-features = false, features = ["napi9"] }
napi-derive = "2"
idprova-core = { path = "../../../../crates/idprova-core" }
chrono = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
ulid = { workspace = true }

[build-dependencies]
napi-build = "2"
