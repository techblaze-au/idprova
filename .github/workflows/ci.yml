name: IDProva CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build-and-test:
    name: Build & Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-${{ matrix.rust }}-
            ubuntu-cargo-

      - name: Build workspace (excluding SDK crates)
        run: cargo build --workspace --exclude idprova-python --exclude idprova-typescript --verbose

      - name: Run tests (excluding SDK crates)
        run: cargo test --workspace --exclude idprova-python --exclude idprova-typescript --verbose

      - name: Run clippy (excluding SDK crates)
        run: cargo clippy --workspace --exclude idprova-python --exclude idprova-typescript -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint (stable only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-stable-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-stable-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all warnings as errors)
        run: cargo clippy --workspace --exclude idprova-python --exclude idprova-typescript -- -D warnings
