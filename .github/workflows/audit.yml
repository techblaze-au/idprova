name: Security Audit

on:
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  push:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
  pull_request:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
  workflow_dispatch:

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
