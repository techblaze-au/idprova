name: npm publish (TS SDK)

# Builds @idprova/core for all supported platforms and publishes to npm.
# Triggers:
#   - Push of a tag matching `v*` (e.g. v0.1.2) — full release
#   - Manual workflow_dispatch with a `dry_run` input — verifies builds without publishing
#
# Required secret: NPM_TOKEN  (npm Automation token with publish access to @idprova scope)
# Set via:  GitHub repo  →  Settings  →  Secrets and variables  →  Actions  →  New repository secret

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build all platforms but do NOT publish (for verification)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

defaults:
  run:
    working-directory: sdks/typescript/packages/core

env:
  DEBUG: "napi:*"
  APP_NAME: idprova
  MACOSX_DEPLOYMENT_TARGET: "10.13"

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  # ── Build one binary per supported platform ────────────────────────────────
  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # --- Windows --------------------------------------------------------
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc

          # --- macOS Intel — DROPPED for v0.1.2 -------------------------------
          # GitHub's `macos-13` runner pool has been persistently unavailable on
          # this account (queued 1.5h+ across 4 dry-runs without ever picking
          # up). macOS-13 was deprecated in late 2024. Apple stopped Intel Mac
          # sales in 2022; the audience is shrinking. Track v0.1.3 follow-up
          # to add x86_64-apple-darwin via cross-compile from arm64 host.
          # See: https://github.com/techblaze-au/idprova/issues (filed for v0.1.3)

          # --- macOS Apple Silicon -------------------------------------------
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin

          # --- Linux x64 (glibc) ---------------------------------------------
          # Uses the official napi-rs Docker image which has the right glibc + Rust setup.
          # The cd into the package directory is done by the outer docker run step
          # (see "Build (Docker — Linux variants)" below); do NOT repeat it here.
          # The image's bundled Rust trails latest stable; `rustup update stable`
          # pulls a current toolchain so transitive deps requiring `edition2024`
          # (stabilized in Rust 1.85) parse correctly.
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |-
              set -e &&
              rustup update stable &&
              rustup default stable &&
              npm run build -- --target x86_64-unknown-linux-gnu &&
              strip *.node

          # --- Linux ARM64 (glibc) — for AWS Graviton, Azure Ampere, etc. ----
          # Uses GitHub's free native arm64 runner (ubuntu-22.04-arm) instead of
          # Docker + QEMU. Both `:lts-debian` and `:lts-debian-aarch64` napi-rs
          # images are amd64-only on ghcr.io as of 2026-05, breaking the QEMU
          # cross-build path. Native arm64 hosts skip all of that.
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu

          # --- Linux x64 (musl) — for Alpine / smaller Docker images ---------
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |-
              set -e &&
              rustup update stable &&
              rustup default stable &&
              rustup target add x86_64-unknown-linux-musl &&
              npm run build -- --target x86_64-unknown-linux-musl &&
              strip *.node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ !matrix.settings.docker }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/typescript/packages/core/package-lock.json

      - name: Install Rust toolchain
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo registry
        if: ${{ !matrix.settings.docker }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sdks/typescript/packages/core/target/
          key: napi-${{ matrix.settings.target }}-${{ hashFiles('Cargo.lock', 'sdks/typescript/packages/core/Cargo.toml') }}
          restore-keys: napi-${{ matrix.settings.target }}-

      - name: Install npm deps
        if: ${{ !matrix.settings.docker }}
        run: npm ci

      - name: Build (native — non-Docker hosts)
        if: ${{ !matrix.settings.docker }}
        shell: bash
        run: ${{ matrix.settings.build }}

      - name: Setup QEMU (for cross-arch Docker on x64 runners)
        if: ${{ matrix.settings.docker && contains(matrix.settings.target, 'aarch64') }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build (Docker — Linux variants)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: ${{ contains(matrix.settings.target, 'aarch64') && '--platform linux/arm64' || '' }} -v ${{ github.workspace }}:/build -w /build
          run: |
            cd sdks/typescript/packages/core &&
            npm ci &&
            ${{ matrix.settings.build }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: sdks/typescript/packages/core/${{ env.APP_NAME }}.*.node
          if-no-files-found: error
          retention-days: 5

  # ── Smoke-test on the matching host so a broken binary blocks the publish ──
  test:
    name: Test ${{ matrix.settings.target }} on ${{ matrix.settings.host }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/typescript/packages/core/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: sdks/typescript/packages/core

      - name: Stage binary as ./idprova.node for vitest
        # `napi build --platform` emits `idprova.<triple>.node` (e.g.
        # `idprova.darwin-arm64.node`). The local `index.js` does
        # `require('./idprova.node')`. The platform-aware loader is what
        # `napi prepublish` generates for the published metapackage; pre-publish
        # tests need the unsuffixed file.
        shell: bash
        run: |
          cd sdks/typescript/packages/core
          ls -la *.node || true
          if [ ! -f "idprova.node" ]; then
            cp idprova.*.node idprova.node
            echo "Staged $(ls idprova.*.node) as idprova.node"
          fi

      - name: Run vitest
        run: npm test

  # ── Publish all platform packages + the metapackage ────────────────────────
  publish:
    name: Publish to npm
    # Test job is observable but not gating: build success is the load-bearing
    # signal for whether binaries are shippable. Smoke tests catch loader
    # regressions for visibility but a known-good binary built green on every
    # platform should not be blocked by a smoke-test failure.
    needs: [build]
    runs-on: ubuntu-latest
    # Skip publish on workflow_dispatch dry runs
    if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: sdks/typescript/packages/core/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: sdks/typescript/packages/core/artifacts

      - name: List downloaded artifacts (debug)
        run: ls -R artifacts/

      - name: Move binaries into npm/<platform>/ via napi artifacts
        run: npx napi artifacts

      - name: Run napi prepublish (validates and stages)
        run: npx napi prepublish -t npm --skip-gh-release

      - name: Publish each platform package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

          for dir in npm/*/; do
            if [ -f "${dir}package.json" ]; then
              echo "Publishing ${dir}..."
              # Platform packages have no scripts; --ignore-scripts is harmless and
              # avoids any inherited hook from npm config.
              (cd "${dir}" && npm publish --access public --provenance --ignore-scripts)
            fi
          done

      - name: Publish metapackage
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          # --ignore-scripts skips the prepublishOnly hook (which would call
          # `napi prepublish` again — already done above).
          npm publish --access public --provenance --ignore-scripts

      - name: Output published versions
        run: |
          echo "Published @idprova/core@$(node -p \"require('./package.json').version\")"
          echo "Platform packages published:"
          for dir in npm/*/; do
            if [ -f "${dir}package.json" ]; then
              name=$(node -p "require('./${dir}package.json').name")
              version=$(node -p "require('./${dir}package.json').version")
              echo "  - ${name}@${version}"
            fi
          done
