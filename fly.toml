# IDProva Registry — Fly.io deployment
# Deploy: fly launch --copy-config --no-deploy && fly deploy

app = "idprova-registry"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  REGISTRY_PORT = "8080"
  RUST_LOG = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "registry_data"
  destination = "/app/data"
